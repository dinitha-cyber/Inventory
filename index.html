<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/web.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLMTT.IT Inventory App</title>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:absolute;top:0;left:0;right:0;background:white;padding:20px;font-family:monospace;border-bottom:2px solid red;">ERROR: ' + e.message + '<br>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red;z-index:9999;position:absolute;top:50px;left:0;right:0;background:white;padding:20px;font-family:monospace;border-bottom:2px solid red;">PROMISE REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason) + '</div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
